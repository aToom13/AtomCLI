name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.10
      - name: Install Dependencies
        run: bun install

      - name: Build
        run: |
          cd AtomBase
          bun run build

      - name: Rename and Prepare Release Assets
        run: |
          mkdir release_assets
          # Linux (glibc)
          cp AtomBase/dist/atomcli-linux-x64/bin/atomcli release_assets/atomcli-linux-x64
          cp AtomBase/dist/atomcli-linux-arm64/bin/atomcli release_assets/atomcli-linux-arm64
          # Linux (musl)
          cp AtomBase/dist/atomcli-linux-x64-musl/bin/atomcli release_assets/atomcli-linux-x64-musl
          cp AtomBase/dist/atomcli-linux-arm64-musl/bin/atomcli release_assets/atomcli-linux-arm64-musl
          # Linux (baseline - AVX2 olmayan eski CPU'lar)
          cp AtomBase/dist/atomcli-linux-x64-baseline/bin/atomcli release_assets/atomcli-linux-x64-baseline
          cp AtomBase/dist/atomcli-linux-x64-baseline-musl/bin/atomcli release_assets/atomcli-linux-x64-baseline-musl
          # macOS
          cp AtomBase/dist/atomcli-darwin-x64/bin/atomcli release_assets/atomcli-darwin-x64
          cp AtomBase/dist/atomcli-darwin-arm64/bin/atomcli release_assets/atomcli-darwin-arm64
          cp AtomBase/dist/atomcli-darwin-x64-baseline/bin/atomcli release_assets/atomcli-darwin-x64-baseline
          # Windows
          cp AtomBase/dist/atomcli-windows-x64/bin/atomcli.exe release_assets/atomcli-windows-x64.exe
          cp AtomBase/dist/atomcli-windows-x64-baseline/bin/atomcli.exe release_assets/atomcli-windows-x64-baseline.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release_assets/atomcli-linux-x64
            release_assets/atomcli-linux-arm64
            release_assets/atomcli-linux-x64-musl
            release_assets/atomcli-linux-arm64-musl
            release_assets/atomcli-linux-x64-baseline
            release_assets/atomcli-linux-x64-baseline-musl
            release_assets/atomcli-darwin-x64
            release_assets/atomcli-darwin-arm64
            release_assets/atomcli-darwin-x64-baseline
            release_assets/atomcli-windows-x64.exe
            release_assets/atomcli-windows-x64-baseline.exe
          draft: false
          prerelease: true
          generate_release_notes: true
